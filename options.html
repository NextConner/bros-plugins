<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selection Translator Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Bros Chromium Plugin</p>
        <h1>Selection Translator Settings</h1>
        <p class="summary">
          当前版本聚焦英文划词。你可以设置默认翻译方向、英译中来源、英英词典来源，并决定是否在划词后自动请求结果。
        </p>
      </section>

      <section class="card">
        <label>
          默认翻译方向
          <select id="target-language">
            <option value="zh">英译中</option>
            <option value="en">英译英</option>
          </select>
        </label>

        <label>
          英译中来源
          <select id="provider-zh">
            <option value="google">Google Web</option>
            <option value="mymemory">MyMemory</option>
          </select>
        </label>

        <label>
          英英词典来源
          <select id="provider-en">
            <option value="dictionaryapi">Free Dictionary API</option>
            <option value="datamuse">Datamuse</option>
          </select>
        </label>

        <label class="checkbox">
          <input id="auto-translate" type="checkbox" />
          <span>划词后自动翻译</span>
        </label>

        <div class="notes">
          <p>英英词典模式当前针对单词释义做了优化，短语或整句不会返回词典结果。</p>
          <p>英译中选中单词时会优先补充音标和多个中文义项；在线来源可能存在速率限制。</p>
        </div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
